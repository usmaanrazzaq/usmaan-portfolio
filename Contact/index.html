<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Usmaan Razzaq — Product Designer & Front-End Developer. Send a message about your project.">
    <title>Contact | Usmaan Razzaq</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../nav.css">
    <link rel="stylesheet" href="contact.css">
    <link
        href="https://api.fontshare.com/v2/css?f[]=tabular@300,400,500,600&f[]=satoshi@300,400,500,700&f[]=general-sans@200,300,400,500,600,700&f[]=boska@300,400,500,700&f[]=quicksand@500&display=swap"
        rel="stylesheet">
    <link
        href="https://api.fontshare.com/v2/css?f[]=ranade@100,300,400,500,700&f[]=switzer@100,200,300,400,500,600,700,800,900&f[]=general-sans@200,300,400,500,600,700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="../Favicon.png" sizes="48x48">
    <link rel="apple-touch-icon" href="../iOS Icon.png" sizes="180x180"> 
</head>

<body>
    <!-- Page Loader -->
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <header id="nav-container" data-path="/nav.html"></header>
    
    <main class="contact-page">
        <p class="contact-heading">Have a project in mind? Send me a message.</p>
        
        <form class="contact-form" id="contact-form">
            <input type="text" name="name" id="contact-name" class="contact-input" placeholder="Name" required>
            <input type="email" name="email" id="contact-email" class="contact-input" placeholder="Email" required>
            <textarea name="message" id="contact-message" class="contact-textarea" placeholder="Type a message" required></textarea>
            <button type="submit" class="contact-submit">Send</button>
        </form>

        <script>
            document.getElementById('contact-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('contact-name').value;
                const email = document.getElementById('contact-email').value;
                const message = document.getElementById('contact-message').value;

                const subject = encodeURIComponent('Contact from ' + name);
                const body = encodeURIComponent('From: ' + name + '\nEmail: ' + email + '\n\nMessage:\n' + message);

                window.location.href = 'mailto:usmaan@usmaanrazzaq.design?subject=' + subject + '&body=' + body;
            });
        </script>
    </main>
    
    <script src="../main.js?v=20260129"></script>
</body>

</html>
